<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz 🧠</title>
    <link rel="icon" href="{{ ic }}" type="image/png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;800&display=swap');

        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0a0a0a;
            --white: #fffef0;
            --yellow: #FFE500;
            --pink: #FF3CAC;
            --blue: #2DFAFF;
            --green: #00FF87;
            --border: 3px solid #0a0a0a;
            --shadow: 5px 5px 0px #0a0a0a;
            --font: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--pink);
            background-image: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0, 0, 0, 0.07) 39px, rgba(0, 0, 0, 0.07) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0, 0, 0, 0.07) 39px, rgba(0, 0, 0, 0.07) 40px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
            font-family: var(--font);
            color: var(--black);
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            background: var(--black);
            color: var(--pink);
            padding: 10px 24px;
            border: var(--border);
            display: inline-block;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .qn {
            background: var(--white);
            border: var(--border);
            box-shadow: var(--shadow);
            padding: 22px 24px;
            width: 100%;
            max-width: 480px;
            margin-bottom: 18px;
        }

        .q-number {
            display: inline-block;
            background: var(--black);
            color: var(--yellow);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 3px 10px;
            margin-bottom: 10px;
        }

        .q-text {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 14px;
            line-height: 1.4;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .option-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 9px 12px;
            border: 2px solid var(--black);
            background: var(--white);
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.1s, box-shadow 0.1s;
            user-select: none;
        }

        .option-label:hover {
            background: var(--blue);
        }

        .option-label input[type="radio"] {
            accent-color: var(--black);
            width: 15px;
            height: 15px;
            margin: 0;
            flex-shrink: 0;
            cursor: pointer;
        }

        .submit-row {
            width: 100%;
            max-width: 480px;
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }

        button {
            font-family: var(--font);
            font-size: 17px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 14px 36px;
            border: var(--border);
            background: var(--green);
            color: var(--black);
            cursor: pointer;
            transition: box-shadow 0.12s, transform 0.12s;
            box-shadow: var(--shadow);
        }

        button:hover {
            box-shadow: 8px 8px 0 var(--black);
            transform: translate(-2px, -2px);
        }

        button:active {
            box-shadow: 2px 2px 0 var(--black);
            transform: translate(3px, 3px);
        }
    </style>
</head>

<body>

    <div class="page-title">🧠 Quiz Yourself</div>

    <form method="post" action="/quiz">
        <input name="QUESTIONS" value="{{ anss }}" hidden>

        {% set questions = [
        (1, ques[0]),
        (2, ques[1]),
        (3, ques[2]),
        (4, ques[3]),
        (5, ques[4]),
        (6, ques[5]),
        (7, ques[6]),
        (8, ques[7]),
        (9, ques[8]),
        (10, ques[9])
        ] %}

        {% for num, q in questions %}
        <div class="qn">
            <span class="q-number">Question {{ num }}</span>
            <p class="q-text">{{ q["question"] }}</p>
            <div class="options">
                <label class="option-label">
                    <input type="radio" name="A{{ num }}" value="a"> {{ q["opt_a"] }}
                </label>
                <label class="option-label">
                    <input type="radio" name="A{{ num }}" value="b"> {{ q["opt_b"] }}
                </label>
                <label class="option-label">
                    <input type="radio" name="A{{ num }}" value="c"> {{ q["opt_c"] }}
                </label>
                <label class="option-label">
                    <input type="radio" name="A{{ num }}" value="d"> {{ q["opt_d"] }}
                </label>
            </div>
        </div>
        {% endfor %}

        <div class="submit-row">
            <button type="submit">✅ Submit Quiz</button>
        </div>
    </form>

</body>

</html>
